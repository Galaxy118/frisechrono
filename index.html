<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FriseChrono — Créateur de frises chronologiques</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       TOOLBAR — Barre d'outils supérieure
       ═══════════════════════════════════════════════════════ -->
  <header id="toolbar">
    <!-- Groupe : Fichier -->
    <div class="toolbar-group">
      <button id="btn-new" class="toolbar-btn" title="Nouveau document">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Nouveau</span>
      </button>
      <button id="btn-open" class="toolbar-btn" title="Ouvrir un fichier">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Ouvrir</span>
      </button>
      <button id="btn-save" class="toolbar-btn" title="Sauvegarder">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="17 21 17 13 7 13 7 21" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="7 3 7 8 15 8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Sauver</span>
      </button>
      <div class="toolbar-dropdown">
        <button id="btn-export" class="toolbar-btn" title="Exporter">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="7 10 12 15 17 10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"/></svg>
          <span>Exporter ▾</span>
        </button>
        <div class="dropdown-menu">
          <button id="btn-export-png" class="dropdown-item">Export PNG</button>
          <button id="btn-export-jpg" class="dropdown-item">Export JPG</button>
          <button id="btn-export-pdf" class="dropdown-item">Export PDF</button>
        </div>
      </div>
    </div>

    <div class="toolbar-separator"></div>

    <!-- Groupe : Historique -->
    <div class="toolbar-group">
      <button id="btn-undo" class="toolbar-btn" title="Annuler (Ctrl+Z)">
        <svg viewBox="0 0 24 24" width="20" height="20"><polyline points="1 4 1 10 7 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-redo" class="toolbar-btn" title="Refaire (Ctrl+Y)">
        <svg viewBox="0 0 24 24" width="20" height="20"><polyline points="23 4 23 10 17 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

    <!-- Groupe : Zoom -->
    <div class="toolbar-group">
      <button id="btn-zoom-in" class="toolbar-btn" title="Zoom +">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/><line x1="11" y1="8" x2="11" y2="14" stroke="currentColor" stroke-width="2"/><line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <span id="zoom-level" class="zoom-label">100%</span>
      <button id="btn-zoom-out" class="toolbar-btn" title="Zoom −">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/><line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-zoom-fit" class="toolbar-btn" title="Ajuster à l'écran">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

    <!-- Groupe : Outils d'ajout -->
    <div class="toolbar-group">
      <button id="btn-add-event" class="toolbar-btn toolbar-btn--accent" title="Ajouter un événement">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2"/><line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2"/></svg>
        <span>Événement</span>
      </button>
      <button id="btn-add-period" class="toolbar-btn toolbar-btn--accent" title="Ajouter une période">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>Période</span>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       CONTENU PRINCIPAL — Panneau + Canvas
       ═══════════════════════════════════════════════════════ -->
  <main id="app-main">

    <!-- ─── Panneau latéral gauche : Propriétés ─── -->
    <aside id="panel-left">
      <div class="panel-scroll">

        <!-- Section : Document -->
        <section class="panel-section">
          <h3 class="panel-section-title" data-toggle="section-document">
            <span class="toggle-arrow">▼</span> Document
          </h3>
          <div id="section-document" class="panel-section-body">
            <div class="prop-row">
              <label for="prop-title">Titre</label>
              <input type="text" id="prop-title" value="Ma frise chronologique" />
            </div>
            <div class="prop-row">
              <label for="prop-format">Format page</label>
              <select id="prop-format">
                <option value="A4" selected>A4 paysage</option>
                <option value="A3">A3 paysage</option>
                <option value="A2">A2 paysage</option>
                <option value="custom">Personnalisé</option>
              </select>
            </div>
            <div class="prop-row">
              <label for="prop-bg-color">Fond</label>
              <input type="color" id="prop-bg-color" value="#ffffff" />
            </div>
            <div class="prop-row">
              <label for="prop-line-style">Style ligne</label>
              <select id="prop-line-style">
                <option value="solid" selected>Continue</option>
                <option value="dashed">Tirets</option>
                <option value="none">Aucune</option>
              </select>
            </div>
            <div class="prop-row">
              <label for="prop-line-color">Couleur ligne</label>
              <input type="color" id="prop-line-color" value="#333333" />
            </div>
            <div class="prop-row">
              <label for="prop-line-width">Épaisseur</label>
              <input type="number" id="prop-line-width" min="1" max="10" value="3" />
            </div>
            <div class="prop-row">
              <label for="prop-font">Police</label>
              <select id="prop-font">
                <option value="Arial" selected>Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Verdana">Verdana</option>
              </select>
            </div>
            <div class="prop-row">
              <label for="prop-year-format">Format année</label>
              <select id="prop-year-format">
                <option value="numeric" selected>1900</option>
                <option value="bc">3000 av. J.-C.</option>
              </select>
            </div>
          </div>
        </section>

        <!-- Section : Barre de temps -->
        <section class="panel-section">
          <h3 class="panel-section-title" data-toggle="section-timebar">
            <span class="toggle-arrow">▼</span> Barre de temps
          </h3>
          <div id="section-timebar" class="panel-section-body">
            <div class="prop-row">
              <label for="prop-year-start">Année début</label>
              <input type="number" id="prop-year-start" value="1900" />
            </div>
            <div class="prop-row">
              <label for="prop-year-end">Année fin</label>
              <input type="number" id="prop-year-end" value="2000" />
            </div>
            <div class="prop-row">
              <label for="prop-scale-main">Échelle principale</label>
              <select id="prop-scale-main">
                <option value="1">1 an</option>
                <option value="2">2 ans</option>
                <option value="5">5 ans</option>
                <option value="10" selected>10 ans</option>
                <option value="20">20 ans</option>
                <option value="25">25 ans</option>
                <option value="50">50 ans</option>
                <option value="100">100 ans</option>
                <option value="500">500 ans</option>
                <option value="1000">1000 ans</option>
              </select>
            </div>
            <div class="prop-row">
              <label for="prop-scale-secondary">Échelle secondaire</label>
              <select id="prop-scale-secondary">
                <option value="0">Aucune</option>
                <option value="1">1 an</option>
                <option value="2">2 ans</option>
                <option value="5" selected>5 ans</option>
                <option value="10">10 ans</option>
                <option value="25">25 ans</option>
                <option value="50">50 ans</option>
              </select>
            </div>
            <div class="prop-row">
              <label for="prop-bar-height">Hauteur barre</label>
              <input type="number" id="prop-bar-height" min="20" max="80" value="40" />
            </div>
            <div class="prop-row">
              <label for="prop-bar-color">Couleur barre</label>
              <input type="color" id="prop-bar-color" value="#4a90d9" />
            </div>
          </div>
        </section>

        <!-- Section : Césures -->
        <section class="panel-section">
          <h3 class="panel-section-title" data-toggle="section-cesures">
            <span class="toggle-arrow">▼</span> Césures
          </h3>
          <div id="section-cesures" class="panel-section-body">
            <div id="cesure-list">
              <!-- Les césures seront ajoutées dynamiquement -->
            </div>
            <div class="prop-row cesure-add-row">
              <input type="number" id="cesure-start" placeholder="Début" />
              <input type="number" id="cesure-end" placeholder="Fin" />
              <button id="btn-add-cesure" class="btn-small" title="Ajouter une césure">+</button>
            </div>
          </div>
        </section>

        <!-- Section : Événements (liste) -->
        <section class="panel-section">
          <h3 class="panel-section-title" data-toggle="section-events">
            <span class="toggle-arrow">▼</span> Événements
            <span id="event-count" class="badge">0</span>
          </h3>
          <div id="section-events" class="panel-section-body">
            <div id="event-list">
              <!-- Les événements seront listés dynamiquement -->
              <p class="empty-msg">Aucun événement. Cliquez sur "+ Événement" pour en ajouter.</p>
            </div>
          </div>
        </section>

      </div>

      <!-- Bouton de validation -->
      <div class="panel-footer">
        <button id="btn-apply" class="btn-apply" title="Appliquer les modifications">
          <svg viewBox="0 0 24 24" width="28" height="28"><polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Appliquer</span>
        </button>
      </div>
    </aside>

    <!-- ─── Séparateur redimensionnable ─── -->
    <div id="panel-resizer"></div>

    <!-- ─── Zone Canvas (frise) ─── -->
    <div id="canvas-container">
      <div id="canvas-wrapper">
        <canvas id="timeline-canvas"></canvas>
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════════════════
       MODALE — Ajout/édition d'événement
       ═══════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-event">
      <div class="modal-header">
        <h2 id="modal-event-title">Ajouter un événement</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label for="evt-date">Date (année)</label>
          <input type="number" id="evt-date" placeholder="ex: 1945" />
        </div>
        <div class="form-row">
          <label for="evt-date-precise">Date précise (optionnel)</label>
          <input type="text" id="evt-date-precise" placeholder="ex: 08/05/1945" />
        </div>
        <div class="form-row">
          <label for="evt-title">Titre</label>
          <input type="text" id="evt-title" placeholder="Titre de l'événement" />
        </div>
        <div class="form-row">
          <label for="evt-description">Description</label>
          <textarea id="evt-description" rows="3" placeholder="Description (optionnel)"></textarea>
        </div>
        <div class="form-row form-row--inline">
          <div>
            <label for="evt-color">Couleur</label>
            <input type="color" id="evt-color" value="#e74c3c" />
          </div>
          <div>
            <label for="evt-position">Position</label>
            <select id="evt-position">
              <option value="above" selected>Au-dessus</option>
              <option value="below">En-dessous</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label for="evt-image">Image URL (optionnel)</label>
          <input type="text" id="evt-image" placeholder="https://..." />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-evt-cancel" class="btn-secondary">Annuler</button>
        <button id="btn-evt-delete" class="btn-danger hidden">Supprimer</button>
        <button id="btn-evt-save" class="btn-primary">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MODALE — Ajout/édition de période
       ═══════════════════════════════════════════════════════ -->
  <div id="modal-period-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-period">
      <div class="modal-header">
        <h2 id="modal-period-title">Ajouter une période</h2>
        <button class="modal-close" id="modal-period-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label for="period-start">Année début</label>
          <input type="number" id="period-start" placeholder="ex: 1914" />
        </div>
        <div class="form-row">
          <label for="period-end">Année fin</label>
          <input type="number" id="period-end" placeholder="ex: 1918" />
        </div>
        <div class="form-row">
          <label for="period-label">Libellé</label>
          <input type="text" id="period-label" placeholder="ex: Première Guerre mondiale" />
        </div>
        <div class="form-row form-row--inline">
          <div>
            <label for="period-color">Couleur</label>
            <input type="color" id="period-color" value="#3498db" />
          </div>
          <div>
            <label for="period-opacity">Opacité</label>
            <input type="range" id="period-opacity" min="0.1" max="1" step="0.1" value="0.3" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-period-cancel" class="btn-secondary">Annuler</button>
        <button id="btn-period-delete" class="btn-danger hidden">Supprimer</button>
        <button id="btn-period-save" class="btn-primary">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/events.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
